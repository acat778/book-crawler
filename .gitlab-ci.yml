# Book Crawler — GitLab CI/CD 自动部署
# Runner: dev-gitlab-acat-fun

stages:
  - deploy

# ==================== 部署 ====================

deploy:
  stage: deploy
  tags:
    - dev-gitlab-acat-fun
  script:
    - echo "=== 安装后端依赖 ==="
    - npm install --no-audit
    - echo "=== 安装前端依赖并编译 ==="
    - cd frontend && npm install --no-audit && npm run build && cd ..
    - echo "=== 编译完成，重启服务 ==="
    - |
      # PM2 daemon 使用 process.cwd() 作为 spawn 工作目录，
      # 必须切到 gitlab-runner 可遍历的目录，否则 /root (700) 会导致 EACCES
      SCRIPT_DIR="$(pwd)"
      cd /tmp
      if pm2 list | grep -q "book-crawler"; then
        echo "重启现有进程..."
        pm2 restart book-crawler --update-env
      else
        echo "首次启动..."
        pm2 start "$SCRIPT_DIR/ecosystem.config.cjs"
      fi
    - pm2 save
    - echo "=== 部署完成 ==="
  only:
    - master
