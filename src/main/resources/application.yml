server:
  port: 9005

spring:
  datasource:
    url: jdbc:mysql://192.168.250.50:3306/acat_dev?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    mongodb:
      host: 192.168.250.51
      port: 27017
      database: acat_dev

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 爬虫配置
crawler:
  google-search-url: https://www.google.com/search
  base-url: https://www.69shuba.com
  default-cover: https://static.69shuba.com/images/nocover.jpg
  # Google 搜索 XPath
  xpath:
    google:
      input: /html/body/div[3]/ul/li/div/div[2]/form/input
      submit: /html/body/div[3]/ul/li/div/div[2]/form/button
      result: /html/body/div[3]/div/div[11]/div/div[2]/div[2]/div/div/div
      result-url: div/div/div/div[1]/div/div/span/a
      pages-nav: /html/body/div[3]/div/div[11]/div/div[3]/div/div[4]/table/tbody/tr
    book:
      title: /html/body/div[2]/ul/li[1]/div[1]/div/div[2]/h1/a
      author: /html/body/div[2]/ul/li[1]/div[1]/div/div[2]/p[1]/a
      cover: /html/body/div[2]/ul/li[1]/div[1]/div/div[1]/img
      category: /html/body/div[2]/ul/li[1]/div[1]/div/div[2]/p[2]/a
      status: /html/body/div[2]/ul/li[1]/div[1]/div/div[2]/p[3]
      introduction: /html/body/div[2]/ul/li[1]/div[2]/div/div[2]/div/p[1]
      tags: /html/body/div[2]/ul/li[1]/div[2]/div[1]/ul
    chapter:
      title: /html/body/div[2]/div[1]/div[3]/h1
      create-time: /html/body/div[2]/div[1]/div[3]/div[1]/span[1]
      paragraphs: /html/body/div[2]/div[1]/div[3]
